name: kotobalink

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kotobalink}
      POSTGRES_USER: ${POSTGRES_USER:-kotobalink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kotobalink}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kotobalink-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kotobalink} -d ${POSTGRES_DB:-kotobalink}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../apps/backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://kotobalink:kotobalink@postgres:5432/kotobalink}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../../apps/backend:/service
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  admin:
    build:
      context: ../../apps/admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${ADMIN_PORT:-5173}:5173"
    environment:
      PNPM_HOME: /pnpm
    volumes:
      - ../../apps/admin:/workspace
      - kotobalink-admin-node-modules:/workspace/node_modules
      - kotobalink-admin-pnpm-store:/pnpm/store
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: ["sh", "-c", "corepack enable && pnpm config set store-dir /pnpm/store && pnpm install --frozen-lockfile && pnpm dev"]

volumes:
  kotobalink-postgres-data:
  kotobalink-admin-node-modules:
  kotobalink-admin-pnpm-store:
