name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend-production
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+psycopg://kotobalink:kotobalink@127.0.0.1:5432/kotobalink
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kotobalink
          POSTGRES_USER: kotobalink
          POSTGRES_PASSWORD: kotobalink
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kotobalink -d kotobalink"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Initialize test database
        run: python -c "from app.db.init_data import init_db; init_db()"

      - name: Run backend tests
        run: pytest

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.EC2_HOST }}
        run: |
          SSH_HOST_CLEAN="$(printf '%s' "$SSH_HOST" | tr -d '\r\n\t ')"
          SSH_PRIVATE_KEY_CLEAN="$(printf '%s' "$SSH_PRIVATE_KEY" | tr -d '\r')"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY_CLEAN" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST_CLEAN" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        env:
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USER }}
          APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          SSH_HOST_CLEAN="$(printf '%s' "$SSH_HOST" | tr -d '\r\n\t ')"
          SSH_USER_CLEAN="$(printf '%s' "$SSH_USER" | tr -d '\r\n\t ')"
          APP_DIR_CLEAN="$(printf '%s' "$APP_DIR" | tr -d '\r\n')"
          ssh "$SSH_USER_CLEAN@$SSH_HOST_CLEAN" "bash -lc '
            set -e
            cd \"$APP_DIR_CLEAN\"
            git fetch origin main
            git reset --hard origin/main
            cd apps/backend
            if [ ! -d .venv ]; then
              python3 -m venv .venv
            fi
            .venv/bin/pip install --upgrade pip
            .venv/bin/pip install -e .
            sudo systemctl restart kotobalink-backend
            sudo systemctl is-active --quiet kotobalink-backend
            curl --fail --silent http://127.0.0.1:8000/health > /dev/null
          '"
