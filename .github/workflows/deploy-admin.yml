name: Deploy Admin

on:
  push:
    branches:
      - main
    paths:
      - 'apps/admin/**'
      - 'infra/nginx/kotobalink.conf'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-admin-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install admin dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin
        run: pnpm build

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.EC2_HOST }}
        run: |
          SSH_HOST_CLEAN="$(printf '%s' "$SSH_HOST" | tr -d '\r\n\t ')"
          SSH_PRIVATE_KEY_CLEAN="$(printf '%s' "$SSH_PRIVATE_KEY" | tr -d '\r')"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY_CLEAN" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST_CLEAN" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        env:
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USER }}
          APP_DIR: ${{ secrets.EC2_APP_DIR }}
          ADMIN_PUBLIC_URL: ${{ secrets.ADMIN_PUBLIC_URL }}
        run: |
          SSH_HOST_CLEAN="$(printf '%s' "$SSH_HOST" | tr -d '\r\n\t ')"
          SSH_USER_CLEAN="$(printf '%s' "$SSH_USER" | tr -d '\r\n\t ')"
          APP_DIR_CLEAN="$(printf '%s' "$APP_DIR" | tr -d '\r\n')"
          ADMIN_PUBLIC_URL_CLEAN="$(printf '%s' "$ADMIN_PUBLIC_URL" | tr -d '\r\n\t ')"
          if [ -z "$ADMIN_PUBLIC_URL_CLEAN" ]; then
            echo "ADMIN_PUBLIC_URL secret is required"
            exit 1
          fi
          ssh "$SSH_USER_CLEAN@$SSH_HOST_CLEAN" "bash -lc '
            set -e
            cd \"$APP_DIR_CLEAN\"
            git fetch origin main
            git reset --hard origin/main
            cd apps/admin
            sudo docker build --no-cache \
              -t kotobalink-admin:latest \
              --build-arg VITE_API_BASE_URL=\"$ADMIN_PUBLIC_URL_CLEAN/api/v1\" \
              --build-arg VITE_MEDIA_BASE_URL=\"$ADMIN_PUBLIC_URL_CLEAN\" .
            sudo docker rm -f kotobalink-admin || true
            sudo docker run -d \
              --name kotobalink-admin \
              --restart unless-stopped \
              -p 127.0.0.1:8080:80 \
              kotobalink-admin:latest
            sudo cp \"$APP_DIR_CLEAN/infra/nginx/kotobalink.conf\" /etc/nginx/conf.d/kotobalink.conf
            sudo nginx -t
            sudo systemctl reload nginx
            curl --fail --silent http://127.0.0.1:8080/ > /dev/null
          '"
